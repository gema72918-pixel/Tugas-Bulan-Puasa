<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gema Ramadhan</title>
  <style>
    button{
      background-color: green;
      border: 0px solid green;
      padding: 10px 5px;
      color: white;
      margin: 0px 20px;
      transition: 1s;
    }
    button:hover{
      padding: 10px 25px;
      cursor: pointer;
      margin: 0px;
    }
  </style>
</head>
<body>
  <button>One</button>
  <button>Two</button>
  <button>Three</button>
</body>
</html>
